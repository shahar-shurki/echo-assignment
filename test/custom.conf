# Mounted into both containers at /etc/nginx/conf.d/custom.conf so the
# "custom-config" scenario can verify both images load extra config the same way.

server {
    listen       8081;
    server_name  custom.local;

    location /echo-healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    location /echo-headers {
        default_type text/plain;
        return 200 "via=$server_name path=$uri ua=$http_user_agent\n";
    }

    location /echo-big {
        client_max_body_size 5m;
        return 200 "received\n";
    }
}
